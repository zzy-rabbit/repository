<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>中转站</title>

    <script src="https://unpkg.com/tus-js-client/dist/tus.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="/css/common.css">

    <style>
        .drop {
            border: 2px dashed #6ea8fe;
            border-radius: 14px;
            background: #f8fbff;
            padding: 45px;
            text-align: center;
            transition: .2s;
            cursor: pointer;
        }
        .drop.drag { background: #e8f2ff; }
        .drop svg { width: 60px; height: 60px; fill: #3b82f6; }
        .drop p { color: #555; margin-top: 15px; }
        #fileInput { display: none; }

        .summary { margin-top: 15px; color: #666; font-size: 14px; }

        .file-item {
            display: flex;
            flex-direction: column;
            padding: 12px 15px;
            border-bottom: 1px solid #efefef;
            background: white;
        }
        .file-header { display: flex; align-items: center; width: 100%; }
        .file-info { flex: 1; }
        .file-name { color: #333; font-size: 14px; font-weight: 600; }
        .file-size { color: #999; font-size: 12px; margin-top: 4px; }
        .remove-btn {
            width: 28px; height: 28px;
            border: none; border-radius: 50%;
            background: #ef4444; color: white;
            cursor: pointer; font-size: 18px;
        }

        .progress-container {
            margin-top: 10px;
            width: 100%;
            display: none;
        }

        .success-panel {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }
        .success-panel.show { display: block; }
        .share-link {
            background: #f8fafc;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 15px;
            word-break: break-all;
            text-align: left;
            border: 1px solid #e2e8f0;
            margin: 20px 0;
            color: #1e2937;
        }

        /* 主面板二维码（隐藏式） */
        #qrcode {
            display: none; /* 默认隐藏，主面板不再显示 */
        }

        /* 新增弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px 25px;
            border-radius: 16px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        .modal-content h3 {
            margin: 0 0 20px 0;
            color: #1e2937;
        }
        .modal-qrcode {
            margin: 15px auto;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            display: inline-block;
        }
        .close-modal {
            margin-top: 20px;
            padding: 10px 28px;
            background: #64748b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        /* 按钮样式优化 */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="card" id="mainCard">
    <h1>中转站</h1>
    <div style="text-align:center; margin:25px 0 15px; font-size:13px; color:#666;">
        <span style="margin-left:8px; color:#888;">使用本服务即表示您已阅读并同意全部条款</span>
        <a href="javascript:void(0)" onclick="showDisclaimer()" style="color:#3b82f6; text-decoration:underline dotted;">
            📜 查看服务免责声明
        </a>
    </div>

    <div class="item">
        <div class="drop" id="drop">
            <svg viewBox="0 0 24 24">
                <path d="M5 20h14v-2H5zm7-18L5.33 9h3.84v4h5.66V9h3.84z" />
            </svg>
            <p>点击选择文件 或 拖拽文件到这里</p>
            <input id="fileInput" type="file" accept="image/*" multiple>
        </div>

        <div class="summary" id="summary">尚未选择文件</div>
        <div class="file-list" id="fileList"></div>
    </div>

    <div class="item">
        <div class="label">提取密码（4位字母或数字）</div>
        <input id="password" type="password" maxlength="4" placeholder="请输入4位密码">
    </div>

    <div class="item">
        <div class="label">有效期</div>
        <select id="expire"></select>
    </div>

    <button class="btn" id="uploadBtn">提交</button>
</div>

<!-- 成功结果面板 -->
<div class="card success-panel" id="successPanel">
    <h1 style="color:#10b981; margin-bottom: 10px;">✅ 提交成功！</h1>
    <p style="color:#64748b; margin-bottom: 25px;">复制下方链接即可查看 请妥善保管提取链接和密码</p>

    <div class="share-link" id="shareLink"></div>

    <!-- 二维码按钮区域 -->
    <div class="btn-row">
        <button class="btn" id="copyBtn" style="flex: 1; background:linear-gradient(135deg,#10b981,#059669);">
            📋 复制链接
        </button>
        <button class="btn" id="qrBtn" style="flex: 1; background:linear-gradient(135deg,#3b82f6,#2563eb);">
            📱 二维码
        </button>
    </div>

    <div style="display:flex; gap:12px;">
        <button class="btn" id="viewBtn" style="flex:1; background:#64748b;">立即查看</button>
        <button class="btn" id="newUploadBtn" style="flex:1;">继续上传新文件</button>
    </div>

    <!-- 隐藏的主面板二维码容器（必须保留） -->
    <div id="qrcode"></div>
</div>

<!-- 二维码弹窗 -->
<div class="modal" id="qrModal">
    <div class="modal-content">
        <h3>提取二维码</h3>
        <div class="modal-qrcode" id="modalQrcode"></div>
        <p style="color:#64748b; font-size:14px; margin:15px 0;">使用手机扫描即可快速访问</p>
        <button class="close-modal" id="closeModal">关闭</button>
    </div>
</div>

<script src="/js/common.js"></script>
<script>
    const PASSWORD_REG = /^[A-Za-z0-9]{4}$/;
    const MAX_FILE_SIZE = 1024 * 1024;
    const MAX_FILES = 9;  // 最大上传文件数，方便后续修改
    const files = [];
    const fileIds = [];
    let uploading = false;
    let repositoryId = null;
    let currentShareUrl = "";

    const passwordInput = document.getElementById("password");
    const expireSelect = document.getElementById("expire");
    const fileInput = document.getElementById("fileInput");
    const drop = document.getElementById("drop");
    const fileList = document.getElementById("fileList");
    const summary = document.getElementById("summary");
    const uploadBtn = document.getElementById("uploadBtn");

    const mainCard = document.getElementById("mainCard");
    const successPanel = document.getElementById("successPanel");
    const shareLinkEl = document.getElementById("shareLink");
    const copyBtn = document.getElementById("copyBtn");
    const qrBtn = document.getElementById("qrBtn");
    const viewBtn = document.getElementById("viewBtn");
    const newUploadBtn = document.getElementById("newUploadBtn");

    const qrModal = document.getElementById("qrModal");
    const modalQrcode = document.getElementById("modalQrcode");

    let qrCodeInstance = null;
    let modalQrInstance = null;

    initPasswordInput("password");

    /* 初始化有效期 */
    (function initExpire() {
        const items = [
            { text: "1 分钟", minute: 1 }, { text: "3 分钟", minute: 3 },
            { text: "5 分钟", minute: 5 }, { text: "10 分钟", minute: 10 },
            { text: "30 分钟", minute: 30 }, { text: "1 小时", minute: 60 },
            { text: "2 小时", minute: 120 }, { text: "6 小时", minute: 360 },
            { text: "12 小时", minute: 720 }, { text: "24 小时", minute: 1440 }
        ];
        for (const item of items) {
            const option = document.createElement("option");
            option.value = item.minute;
            option.innerText = item.text;
            expireSelect.appendChild(option);
        }
        expireSelect.value = "30";
    })();

    /* 拖拽 & 文件选择 */
    drop.addEventListener("click", () => !uploading && fileInput.click());
    drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("drag"); });
    drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
    drop.addEventListener("drop", e => {
        e.preventDefault(); drop.classList.remove("drag");
        if (!uploading) addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener("change", e => {
        addFiles(e.target.files); fileInput.value = "";
    });

    async function addFiles(selected) {
        const filesToProcess = [];
        for (const file of selected) {
            if (!file.type.startsWith("image/")) {
                showToast(file.name + " 不是图片");
                continue;
            }
            filesToProcess.push(file);
        }

        for (let i = 0; i < filesToProcess.length; i++) {
            if (files.length >= MAX_FILES) {
                showToast(`最多只能上传 ${MAX_FILES} 个文件`);
                break;
            }
            const file = filesToProcess[i];
            let processedFile = file;

            if (file.size > MAX_FILE_SIZE) {
                showToast(`正在压缩 ${file.name}...`);
                try {
                    processedFile = await compressImage(file, MAX_FILE_SIZE);
                } catch (e) {
                    console.error(e);
                }
            }

            if (!files.some(f => f.name === processedFile.name && f.size === processedFile.size)) {
                files.push(processedFile);
            }
        }
        renderFiles();
    }

    async function compressImage(file, maxSize) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    let { width, height } = img;
                    const maxDimension = 1920;
                    if (width > maxDimension || height > maxDimension) {
                        if (width > height) {
                            height = Math.round(height * (maxDimension / width));
                            width = maxDimension;
                        } else {
                            width = Math.round(width * (maxDimension / height));
                            height = maxDimension;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    let quality = 0.92;
                    let dataUrl = canvas.toDataURL('image/jpeg', quality);
                    let size = Math.round((dataUrl.length * 3) / 4);

                    while (size > maxSize && quality > 0.5) {
                        quality -= 0.05;
                        dataUrl = canvas.toDataURL('image/jpeg', quality);
                        size = Math.round((dataUrl.length * 3) / 4);
                    }

                    fetch(dataUrl).then(r => r.blob()).then(blob => {
                        resolve(new File([blob], file.name.replace(/\.\w+$/, '.jpg'), {type: 'image/jpeg'}));
                    }).catch(reject);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function removeFile(index) {
        if (uploading) return;
        files.splice(index, 1);
        renderFiles();
    }

    function renderFiles() {
        fileList.innerHTML = "";
        let total = 0;
        files.forEach((file, index) => {
            total += file.size;
            const row = document.createElement("div");
            row.className = "file-item";
            row.dataset.index = index;
            row.innerHTML = `
                <div class="file-header">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-size">${formatSize(file.size)}</div>
                    </div>
                    <button class="remove-btn" onclick="removeFile(${index})">×</button>
                </div>
            `;
            fileList.appendChild(row);
        });
        summary.innerText = files.length === 0
            ? "尚未选择文件"
            : `已选择 ${files.length} 个文件，总大小 ${formatSize(total)}`;
    }

    function setUploading(value) {
        uploading = value;
        uploadBtn.disabled = value;
    }

    async function uploadSingleFile(file, index) { /* 保持原样 */
        return new Promise((resolve, reject) => {
            let upload = new tus.Upload(file, {
                endpoint: host + "/system/api/v1/upload",
                retryDelays: [0, 1000, 3000, 5000],
                metadata: { filename: file.name, filetype: file.type },
                chunkSize: 2 * 1024 * 1024,
                onError: err => reject(err),
                onProgress(bytesUploaded, bytesTotal) {
                    const percent = (bytesUploaded / bytesTotal) * 100;
                    const item = document.querySelector(`.file-item[data-index="${index}"]`);
                    if (item) {
                        let prog = item.querySelector('.progress-container');
                        if (!prog) {
                            prog = document.createElement('div');
                            prog.className = 'progress-container';
                            prog.innerHTML = `<div class="progress"><div class="progress-inner" style="width:0%"></div></div><div class="progress-text">0%</div>`;
                            item.appendChild(prog);
                        }
                        prog.style.display = 'block';
                        prog.querySelector('.progress-inner').style.width = percent + '%';
                        prog.querySelector('.progress-text').innerText = percent.toFixed(1) + '%';
                    }
                },
                async onSuccess() {
                    try {
                        const session = upload.url.split("/").pop();
                        const fileId = await commitUpload(session);
                        if (upload) upload.abort();
                        resolve(fileId);
                    } catch (e) { reject(e); }
                }
            });
            upload.findPreviousUploads().then(prev => {
                if (prev.length) upload.resumeFromPreviousUpload(prev[0]);
                upload.start();
            });
        });
    }

    async function commitUpload(session) {
        const resp = await fetch(host + "/system/api/v1/file/commit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session, type: 1 })
        });
        const json = await resp.json();
        if (json.code !== 0) throw new Error(json.message || "commit失败");
        return json.data.id;
    }

    async function createRepository() {
        const expireMinute = Number(expireSelect.value);
        const expireAt = Math.floor(Date.now() / 1000) + expireMinute * 60;
        const resp = await fetch(host + "/system/api/v1/repository/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                id: "", files: fileIds, password: passwordInput.value,
                expire_at: expireAt, title: "", text: ""
            })
        });
        const json = await resp.json();
        if (json.code !== 0) throw new Error(json.message);
        return json.data.id;
    }

    function showSuccessPage(repoId) {
        repositoryId = repoId;
        const fullUrl = host + "/" + repoId;
        currentShareUrl = fullUrl;
        shareLinkEl.textContent = fullUrl;

        mainCard.style.display = "none";
        successPanel.classList.add("show");

        // 清空旧实例
        if (qrCodeInstance) qrCodeInstance.clear();
    }

    function showQrModal() {
        if (!currentShareUrl) return;
        qrModal.style.display = "flex";

        modalQrcode.innerHTML = "";
        modalQrInstance = new QRCode(modalQrcode, {
            text: currentShareUrl,
            width: 260,
            height: 260,
            colorDark: "#1e40af",
            colorLight: "#ffffff"
        });
    }

    function closeQrModal() {
        qrModal.style.display = "none";
        if (modalQrInstance) modalQrInstance.clear();
    }

    async function startUpload() {
        if (uploading || !PASSWORD_REG.test(passwordInput.value)) {
            showToast("密码必须为4位字母或数字");
            return;
        }
        if (files.length === 0) {
            showToast("请选择文件");
            return;
        }
        if (files.length > MAX_FILES) {
            showToast(`最多只能上传 ${MAX_FILES} 个文件`);
            return;
        }

        fileIds.length = 0;
        setUploading(true);
        uploadBtn.innerText = "准备上传...";

        try {
            for (let i = 0; i < files.length; i++) {
                uploadBtn.innerText = `上传 ${i + 1}/${files.length}`;
                const fileId = await uploadSingleFile(files[i], i);
                fileIds.push(fileId);
            }

            uploadBtn.innerText = "创建中...";
            const repoId = await createRepository();
            showToast("创建成功！");
            showSuccessPage(repoId);
        } catch (e) {
            console.error(e);
            showToast(e.message || "上传失败");
        } finally {
            setUploading(false);
            uploadBtn.innerText = "提交";
        }
    }

    /* 复制功能 - 增强兼容性 */
    function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("✅ 链接已复制");
            }).catch(() => {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        ta.style.top = "-9999px";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
            document.execCommand("copy");
            showToast("✅ 链接已复制");
        } catch (err) {
            showToast("❌ 复制失败，请手动复制");
            console.error("Fallback copy failed", err);
        }
        document.body.removeChild(ta);
    }

    /* 事件绑定 */
    uploadBtn.addEventListener("click", startUpload);
    passwordInput.addEventListener("keydown", e => e.key === "Enter" && startUpload());

    copyBtn.addEventListener("click", () => copyToClipboard(shareLinkEl.textContent));
    qrBtn.addEventListener("click", showQrModal);
    viewBtn.addEventListener("click", () => { if (repositoryId) window.location.href = host + "/" + repositoryId; });
    newUploadBtn.addEventListener("click", () => window.location.reload());

    document.getElementById("closeModal").addEventListener("click", closeQrModal);
    qrModal.addEventListener("click", e => { if (e.target === qrModal) closeQrModal(); });

    document.addEventListener("dragover", e => e.preventDefault());
    document.addEventListener("drop", e => e.preventDefault());

    renderFiles();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>中转站</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="/css/common.css">

    <style>
        /* 页面特有样式 */
        .file-list {
            margin-top: 25px;
            border: 1px solid #ececec;
            border-radius: 12px;
            overflow: hidden;
        }

        .file-item {
            cursor: pointer;
            transition: .15s;
        }
        .file-item:hover {
            background: #f7fbff;
        }

        .thumb {
            width: 72px;
            height: 72px;
            border-radius: 10px;
            background: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        .thumb svg {
            width: 34px;
            height: 34px;
            fill: #8aaef8;
        }

        .status {
            color: #3b82f6;
            font-size: 13px;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        /* 有效期倒计时 */
        .expire-info {
            background: #fefce8;
            border: 1px solid #fde047;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .expire-label {
            font-size: 14px;
            color: #854d0e;
            font-weight: 500;
        }
        .expire-time {
            font-size: 15px;
            font-weight: 600;
            color: #ca8a04;
        }
        .expired {
            background: #fee2e2;
            border-color: #f87171;
        }
        .expired .expire-label,
        .expired .expire-time {
            color: #b91c1c;
        }

        /* 删除按钮 */
        .delete-btn {
            margin-top: 15px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
            transition: .2s;
        }
        .delete-btn:hover {
            background: #dc2626;
        }
        .delete-btn.confirm {
            background: #b91c1c;
        }

        /* Loading & Viewer */
        .loading {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,.85);
            backdrop-filter: blur(5px);
            z-index: 10000;
        }
        .loading-card {
            width: 380px;
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,.12);
        }
        .loading-title {
            text-align: center;
            color: #2563eb;
            font-size: 20px;
            margin-bottom: 25px;
        }

        .viewer {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,.88);
            z-index: 20000;
        }
        .viewer img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
        }

        .deleted-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .deleted-state h2 {
            color: #ef4444;
            margin-bottom: 20px;
        }

        /* 标题可点击 */
        .page-title {
            cursor: pointer;
            transition: color .2s;
        }
        .page-title:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="loading" id="loading">
    <div class="loading-card">
        <div class="loading-title" id="loadingTitle">正在处理...</div>
        <div class="progress">
            <div id="progressInner" class="progress-inner"></div>
        </div>
        <div id="progressText" class="progress-text">0%</div>
    </div>
</div>

<div class="card">
    <h1 onclick="goToHome()" class="page-title">中转站</h1>
    <div style="text-align:center; margin:25px 0 15px; font-size:13px; color:#666;">
        <span style="margin-left:8px; color:#888;">使用本服务即表示您已阅读并同意全部条款</span>
        <a href="javascript:void(0)" onclick="showDisclaimer()" style="color:#3b82f6; text-decoration:underline dotted;">
            📜 查看服务免责声明
        </a>
    </div>

    <!-- 新增：有效期剩余时间 -->
    <div id="expireInfo" class="expire-info" style="display: none;">
        <span class="expire-label">有效期剩余：</span>
        <span id="expireTime" class="expire-time"></span>
    </div>

    <div class="item">
        <div class="label">提取密码</div>
        <input id="password" maxlength="4" type="password" placeholder="请输入4位密码">
    </div>

    <button id="queryBtn" class="btn">查看文件</button>

    <div id="fileList" class="file-list">
        <div class="empty">请输入密码后查看文件</div>
    </div>

    <!-- 新增：删除按钮 -->
    <button id="deleteBtn" class="delete-btn" style="display: none;">删除</button>
</div>

<div id="viewer" class="viewer">
    <img id="viewerImage">
</div>

<script src="/js/common.js"></script>
<script>
    const repositoryId = location.pathname.split("/").pop();
    let authenticated = false;
    let downloaded = false;
    let currentPassword = "";
    let expireAt = 0;
    let countdownInterval = null;
    let deleteConfirmStage = 0; // 0: 未点击, 1: 首次点击(确认中)

    const repository = {};
    const fileInfos = [];
    const blobCache = new Map();
    const urlCache = new Map();

    const loading = document.getElementById("loading");
    const loadingTitle = document.getElementById("loadingTitle");
    const progressInner = document.getElementById("progressInner");
    const progressText = document.getElementById("progressText");

    const passwordInput = document.getElementById("password");
    const queryBtn = document.getElementById("queryBtn");
    const fileList = document.getElementById("fileList");
    const viewer = document.getElementById("viewer");
    const viewerImage = document.getElementById("viewerImage");
    const expireInfo = document.getElementById("expireInfo");
    const expireTimeEl = document.getElementById("expireTime");
    const deleteBtn = document.getElementById("deleteBtn");

    initPasswordInput("password");

    function showLoading(title) {
        loading.style.display = "flex";
        loadingTitle.innerText = title;
        setProgress(0);
    }

    function hideLoading() {
        loading.style.display = "none";
    }

    function setLoadingTitle(title) {
        loadingTitle.innerText = title;
    }

    function setProgress(percent) {
        progressInner.style.width = percent + "%";
        progressText.innerText = percent.toFixed(1) + "%";
    }

    function isPasswordValid() {
        return /^[A-Za-z0-9]{4}$/.test(passwordInput.value);
    }

    function renderEmpty(text) {
        fileList.innerHTML = `<div class="empty">${escapeHtml(text)}</div>`;
    }

    function renderFiles() {
        if (fileInfos.length === 0) {
            renderEmpty("暂无文件");
            return;
        }
        fileList.innerHTML = "";
        for (const file of fileInfos) {
            const item = document.createElement("div");
            item.className = "file-item";
            item.dataset.id = file.id;
            item.innerHTML = `
                <div class="thumb">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Zm-2 0H5l4.5-6 3.5 4.5 2.5-3L19 19Z"/>
                    </svg>
                </div>
                <div class="file-info">
                    <div class="file-name">${escapeHtml(file.name)}</div>
                    <div class="file-size">${formatSize(file.size)}</div>
                </div>
                <div class="status">查看</div>
            `;
            item.onclick = () => previewImage(file.id);
            fileList.appendChild(item);
        }
    }

    /* ---------- 新增：倒计时 ---------- */
    function startCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);

        function updateCountdown() {
            const now = Math.floor(Date.now() / 1000);
            const remaining = expireAt - now;

            if (remaining <= 0) {
                expireTimeEl.textContent = "已过期";
                expireInfo.classList.add("expired");
                clearInterval(countdownInterval);
                return;
            }

            const hours = Math.floor(remaining / 3600);
            const minutes = Math.floor((remaining % 3600) / 60);

            if (hours > 0) {
                expireTimeEl.textContent = `剩余 ${hours} 小时 ${minutes} 分钟`;
            } else {
                expireTimeEl.textContent = `剩余 ${minutes} 分钟`;
            }
        }

        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 30000);
    }

    /* ---------- 删除功能 ---------- */
    function showDeleteButton() {
        deleteBtn.style.display = "block";
    }

    function hideQueryButton() {
        queryBtn.style.display = "none";
    }

    function resetDeleteButton() {
        deleteConfirmStage = 0;
        deleteBtn.textContent = "删除文件";
        deleteBtn.classList.remove("confirm");
    }

    async function deleteRepository() {
        if (!authenticated || !currentPassword) {
            showToast("请先验证密码");
            return;
        }

        showLoading("正在删除...");

        try {
            const resp = await fetch(host + "/system/api/v1/repository", {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify([{
                    id: repositoryId,
                    password: currentPassword
                }])
            });

            if (!resp.ok) throw new Error("删除请求失败");

            const json = await resp.json();
            if (json.code !== 0) throw new Error(json.message || "删除失败");

            // 删除成功
            hideLoading();
            showDeletedState();
            showToast("删除成功");

        } catch (e) {
            hideLoading();
            resetDeleteButton();
            showToast(e.message || "删除失败");
        }
    }

    function showDeletedState() {
        const card = document.querySelector(".card");
        card.innerHTML = `
            <h1 onclick="goToHome()" class="page-title">中转站</h1>
            <div class="deleted-state">
                <h2>✅ 已删除</h2>
                <p>该文件已被成功删除</p>
                <button onclick="goToHome()" class="btn" style="margin-top: 20px; width: auto; padding: 12px 32px;">
                    返回首页
                </button>
            </div>
        `;
    }

    function goToHome() {
        window.location.href = host || (window.location.protocol + "//" + window.location.host);
    }

    /* ---------- API 调用 ---------- */
    async function authentication(password) {
        const resp = await fetch(host + "/system/api/v1/repository/authentication", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: repositoryId, password })
        });
        if (!resp.ok) throw new Error("认证失败");
        const json = await resp.json();
        if (json.code === 4) throw new Error("密码错误");
        if (json.code !== 0) throw new Error(json.message);
        authenticated = true;
        currentPassword = password;
    }

    async function loadRepository() {
        const resp = await fetch(host + "/system/api/v1/repository?ids=" + encodeURIComponent(repositoryId));
        if (!resp.ok) throw new Error("获取存储信息失败");
        const json = await resp.json();
        if (json.code !== 0) throw new Error(json.message);
        if (!json.data.list?.length) throw new Error("内容不存在");

        Object.assign(repository, json.data.list[0]);
        expireAt = repository.expire_at || 0;

        if (expireAt > 0) {
            expireInfo.style.display = "flex";
            startCountdown();
        }
    }

    async function loadFiles() {
        const ids = repository.files || [];
        if (ids.length === 0) return;
        const query = ids.map(id => "ids=" + encodeURIComponent(id)).join("&");
        const resp = await fetch(host + "/system/api/v1/file?" + query);
        if (!resp.ok) throw new Error("获取文件失败");
        const json = await resp.json();
        if (json.code !== 0) throw new Error(json.message);
        fileInfos.length = 0;
        fileInfos.push(...json.data.list);
    }

    async function queryRepository() {
        if (authenticated) return;
        const password = passwordInput.value.trim();
        if (!isPasswordValid()) {
            showToast("请输入4位字母或数字密码");
            return;
        }
        queryBtn.disabled = true;
        try {
            showLoading("正在验证...");
            await authentication(password);
            setLoadingTitle("正在获取文件信息...");
            await loadRepository();
            await loadFiles();
            hideLoading();
            renderFiles();
            passwordInput.disabled = true;

            // 修改1：验证成功后隐藏验证按钮，显示删除按钮
            hideQueryButton();
            showDeleteButton();

            showToast("验证成功");
        } catch (e) {
            hideLoading();
            showToast(e.message || "验证失败");
        } finally {
            if (!authenticated) queryBtn.disabled = false;
        }
    }

    /* ---------- 下载 & 解压（保持不变） ---------- */
    async function downloadZip() {
        showLoading("正在下载文件...");
        const resp = await fetch(host + "/system/api/v1/repository/file", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: repositoryId, password: currentPassword })
        });
        if (!resp.ok) throw new Error("下载失败");

        const total = Number(resp.headers.get("Content-Length") || 0);
        const reader = resp.body.getReader();
        const chunks = [];
        let received = 0;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            if (total > 0) setProgress(received * 100 / total);
            else progressText.innerText = formatSize(received);
        }

        const data = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
            data.set(chunk, offset);
            offset += chunk.length;
        }
        return data.buffer;
    }

    async function unzipZip(buffer) {
        setLoadingTitle("正在解压文件...");
        setProgress(0);
        blobCache.clear();
        urlCache.forEach(url => URL.revokeObjectURL(url));
        urlCache.clear();

        const zip = await JSZip.loadAsync(buffer);
        const entries = Object.values(zip.files).filter(item => !item.dir);
        for (let i = 0; i < entries.length; i++) {
            const entry = entries[i];
            const blob = await entry.async("blob");
            blobCache.set(entry.name, blob);
            setProgress((i + 1) * 100 / entries.length);
        }
        downloaded = true;
        hideLoading();
    }

    async function ensureDownloaded() {
        if (downloaded) return;
        const buffer = await downloadZip();
        await unzipZip(buffer);
    }

    async function previewImage(fileId) {
        if (!authenticated) {
            showToast("请先验证密码");
            return;
        }
        try {
            await ensureDownloaded();
        } catch (e) {
            hideLoading();
            showToast(e.message || "下载失败");
            return;
        }
        const blob = blobCache.get(fileId);
        if (!blob) return showToast("文件不存在");

        let url = urlCache.get(fileId);
        if (!url) {
            url = URL.createObjectURL(blob);
            urlCache.set(fileId, url);
        }
        viewerImage.src = url;
        viewer.style.display = "flex";
        updateThumbnail(fileId, url);
    }

    function updateThumbnail(fileId, url) {
        const item = fileList.querySelector(`[data-id="${fileId}"]`);
        if (!item) return;
        const thumb = item.querySelector(".thumb");
        if (!thumb || thumb.querySelector("img")) return;
        thumb.innerHTML = `<img src="${url}">`;
    }

    /* ---------- 事件绑定 ---------- */
    queryBtn.addEventListener("click", queryRepository);
    passwordInput.addEventListener("keydown", e => e.key === "Enter" && queryRepository());

    // 删除按钮事件
    deleteBtn.addEventListener("click", () => {
        if (deleteConfirmStage === 0) {
            deleteConfirmStage = 1;
            deleteBtn.textContent = "确认删除？";
            deleteBtn.classList.add("confirm");

            // 5秒后自动重置
            setTimeout(() => {
                if (deleteConfirmStage === 1) {
                    resetDeleteButton();
                }
            }, 5000);
        } else {
            deleteRepository();
        }
    });

    viewer.addEventListener("click", () => {
        viewer.style.display = "none";
        viewerImage.removeAttribute("src");
    });

    function initialize() {
        renderEmpty("请输入密码后查看文件");
        const params = new URLSearchParams(location.search);
        const password = params.get("password");
        if (password && /^[A-Za-z0-9]{4}$/.test(password)) {
            passwordInput.value = password;
            queryRepository();
        }
    }

    initialize();

    window.addEventListener("beforeunload", () => {
        if (countdownInterval) clearInterval(countdownInterval);
        urlCache.forEach(url => URL.revokeObjectURL(url));
        urlCache.clear();
    });

    document.addEventListener("keydown", e => {
        if (e.key === "Escape") {
            viewer.style.display = "none";
            viewerImage.removeAttribute("src");
        }
    });
</script>
</body>
</html>

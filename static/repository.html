<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>中转站</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link rel="stylesheet" href="/css/common.css">

    <style>
        /* 页面特有样式 */
        .file-list {
            margin-top: 25px;
            border: 1px solid #ececec;
            border-radius: 12px;
            overflow: hidden;
        }

        .file-item {
            cursor: pointer;
            transition: .15s;
        }
        .file-item:hover {
            background: #f7fbff;
        }

        .thumb {
            width: 72px;
            height: 72px;
            border-radius: 10px;
            background: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        .thumb svg {
            width: 34px;
            height: 34px;
            fill: #8aaef8;
        }

        .status {
            color: #3b82f6;
            font-size: 13px;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        /* 有效期倒计时 */
        .expire-info {
            background: #fefce8;
            border: 1px solid #fde047;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .expire-label {
            font-size: 14px;
            color: #854d0e;
            font-weight: 500;
        }
        .expire-time {
            font-size: 15px;
            font-weight: 600;
            color: #ca8a04;
        }
        .expired {
            background: #fee2e2;
            border-color: #f87171;
        }
        .expired .expire-label,
        .expired .expire-time {
            color: #b91c1c;
        }

        /* 评分区域 */
        .rating-section {
            margin: 20px 0;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .rating-title {
            text-align: center;
            margin-bottom: 12px;
            font-size: 15px;
            color: #334155;
        }
        .stars {
            display: flex;
            justify-content: center;
            gap: 8px;
            font-size: 32px;
            margin-bottom: 16px;
            cursor: pointer;
        }
        .star {
            color: #e2e8f0;
            transition: color 0.2s;
        }
        .star:hover,
        .star.active {
            color: #fbbf24;
        }
        .rating-stats {
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }

        /* 删除按钮 */
        .delete-btn {
            margin-top: 15px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
            transition: .2s;
        }
        .delete-btn:hover {
            background: #dc2626;
        }
        .delete-btn.confirm {
            background: #b91c1c;
        }

        /* Loading & Viewer */
        .loading {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,.85);
            backdrop-filter: blur(5px);
            z-index: 10000;
        }
        .loading-card {
            width: 380px;
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,.12);
        }
        .loading-title {
            text-align: center;
            color: #2563eb;
            font-size: 20px;
            margin-bottom: 25px;
        }

        .viewer {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,.88);
            z-index: 20000;
        }
        .viewer img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
        }

        .deleted-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .deleted-state h2 {
            color: #ef4444;
            margin-bottom: 20px;
        }

        /* 过期状态样式 */
        .expired-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .expired-state .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #ef4444;
            margin-bottom: 10px;
            line-height: 1;
        }
        .expired-state .error-title {
            font-size: 24px;
            color: #374151;
            margin-bottom: 16px;
        }
        .expired-state .error-desc {
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* 标题可点击 */
        .page-title {
            cursor: pointer;
            transition: color .2s;
        }
        .page-title:hover {
            color: #3b82f6;
        }

        /* 底部固定栏 */
        .upload-fixed-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 420px;
        }

        .upload-fixed-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
            border: none;
            padding: 15px 24px;
            border-radius: 9999px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .upload-fixed-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }

        .upload-fixed-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
        }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="loading" id="loading">
    <div class="loading-card">
        <div class="loading-title" id="loadingTitle">正在处理...</div>
        <div class="progress">
            <div id="progressInner" class="progress-inner"></div>
        </div>
        <div id="progressText" class="progress-text">0%</div>
    </div>
</div>

<div class="card">
    <!-- 底部固定上传按钮 -->
    <div class="upload-fixed-bar">
        <button onclick="goToHome()" class="upload-fixed-btn">
            🚀 上传文件
        </button>
    </div>

    <h1 onclick="goToHome()" class="page-title">中转站</h1>
    <div style="text-align:center; margin:25px 0 15px; font-size:13px; color:#666;">
        <span style="margin-left:8px; color:#888;">使用本服务即表示您已阅读并同意全部条款</span>
        <a href="javascript:void(0)" onclick="showDisclaimer()" style="color:#3b82f6; text-decoration:underline dotted;">
            📜 查看服务免责声明
        </a>
    </div>

    <div id="expireInfo" class="expire-info" style="display: none;">
        <span class="expire-label">有效期剩余：</span>
        <span id="expireTime" class="expire-time"></span>
    </div>

    <div class="item">
        <div class="label">提取密码</div>
        <input id="password" maxlength="4" type="password" placeholder="请输入4位密码">
    </div>

    <button id="queryBtn" class="btn">查看文件</button>

    <div id="fileList" class="file-list">
        <div class="empty">请输入密码后查看文件</div>
    </div>

    <!-- 评分区域（下载后显示） -->
    <div id="ratingSection" class="rating-section" style="display: none;">
        <div class="rating-title">请对本次中转服务做出评价</div>
        <div id="stars" class="stars">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
        </div>
        <div id="ratingStats" class="rating-stats"></div>
    </div>

    <button id="deleteBtn" class="delete-btn" style="display: none;">删除</button>
</div>

<div id="viewer" class="viewer">
    <img id="viewerImage">
</div>

<script src="/js/common.js"></script>
<script>
    const repositoryId = location.pathname.split("/").pop();
    let authenticated = false;
    let downloaded = false;
    let currentPassword = "";
    let expireAt = 0;
    let countdownInterval = null;
    let deleteConfirmStage = 0;
    let hasRated = false;

    const repository = {};
    const fileInfos = [];
    const blobCache = new Map();
    const urlCache = new Map();

    const loading = document.getElementById("loading");
    const loadingTitle = document.getElementById("loadingTitle");
    const progressInner = document.getElementById("progressInner");
    const progressText = document.getElementById("progressText");

    const passwordInput = document.getElementById("password");
    const queryBtn = document.getElementById("queryBtn");
    const fileList = document.getElementById("fileList");
    const viewer = document.getElementById("viewer");
    const viewerImage = document.getElementById("viewerImage");
    const expireInfo = document.getElementById("expireInfo");
    const expireTimeEl = document.getElementById("expireTime");
    const deleteBtn = document.getElementById("deleteBtn");
    const ratingSection = document.getElementById("ratingSection");
    const starsContainer = document.getElementById("stars");
    const ratingStatsEl = document.getElementById("ratingStats");

    initPasswordInput("password");

    function showLoading(title) {
        loading.style.display = "flex";
        loadingTitle.innerText = title;
        setProgress(0);
    }

    function hideLoading() {
        loading.style.display = "none";
    }

    function setLoadingTitle(title) {
        loadingTitle.innerText = title;
    }

    function setProgress(percent) {
        progressInner.style.width = percent + "%";
        progressText.innerText = percent.toFixed(1) + "%";
    }

    function isPasswordValid() {
        return /^[A-Za-z0-9]{4}$/.test(passwordInput.value);
    }

    function renderEmpty(text) {
        fileList.innerHTML = `<div class="empty">${escapeHtml(text)}</div>`;
    }

    function renderFiles() {
        if (fileInfos.length === 0) {
            renderEmpty("暂无文件");
            return;
        }
        fileList.innerHTML = "";
        for (const file of fileInfos) {
            const item = document.createElement("div");
            item.className = "file-item";
            item.dataset.id = file.id;
            item.innerHTML = `
                <div class="thumb">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Zm-2 0H5l4.5-6 3.5 4.5 2.5-3L19 19Z"/>
                    </svg>
                </div>
                <div class="file-info">
                    <div class="file-name">${escapeHtml(file.name)}</div>
                    <div class="file-size">${formatSize(file.size)}</div>
                </div>
                <div class="status">查看</div>
            `;
            item.onclick = () => previewImage(file.id);
            fileList.appendChild(item);
        }
    }

    function renderRatingStats() {
        const count = repository.extract_count || 0;
        const ratingCount = repository.rating_count || 0;
        const sum = repository.rating_sum || 0;
        const avg = ratingCount > 0 ? (sum / ratingCount).toFixed(1) : "0.0";

        ratingStatsEl.innerHTML = `
            下载次数 <strong>${count}</strong> ，评价次数 <strong>${ratingCount}</strong> ，平均评分 <strong>${avg}</strong>
        `;
    }

    function setupStarRating() {
        const stars = starsContainer.querySelectorAll('.star');
        stars.forEach(star => {
            star.addEventListener('click', async () => {
                if (hasRated) {
                    showToast("您已评价过本次服务");
                    return;
                }
                const ratingValue = parseInt(star.dataset.value);

                try {
                    const resp = await fetch(host + "/system/api/v1/repository/rating", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            id: repositoryId,
                            password: currentPassword,
                            rating: ratingValue
                        })
                    });

                    if (!resp.ok) throw new Error("评价提交失败");
                    const json = await resp.json();
                    if (json.code !== 0) throw new Error(json.message || "评价失败");

                    hasRated = true;
                    stars.forEach(s => {
                        s.classList.toggle('active', parseInt(s.dataset.value) <= ratingValue);
                    });
                    showToast(`感谢您的 ${ratingValue} 星评价！`);

                    await loadRepository();
                    renderRatingStats();
                } catch (e) {
                    showToast(e.message || "评价失败");
                }
            });

            star.addEventListener('mouseover', () => {
                const value = parseInt(star.dataset.value);
                stars.forEach(s => {
                    s.style.color = parseInt(s.dataset.value) <= value ? '#fbbf24' : '#e2e8f0';
                });
            });

            star.addEventListener('mouseout', () => {
                stars.forEach(s => {
                    s.style.color = s.classList.contains('active') ? '#fbbf24' : '#e2e8f0';
                });
            });
        });
    }

    function showRatingSection() {
        if (ratingSection.style.display === "block") return;
        ratingSection.style.display = "block";
        renderRatingStats();
        setupStarRating();
    }

    function startCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);

        function updateCountdown() {
            const now = Math.floor(Date.now() / 1000);
            const remaining = expireAt - now;
            if (remaining <= 0) {
                expireTimeEl.textContent = "已过期";
                expireInfo.classList.add("expired");
                clearInterval(countdownInterval);
                showExpiredState();
                return;
            }

            const hours = Math.floor(remaining / 3600);
            const minutes = Math.floor((remaining % 3600) / 60);
            const seconds = remaining % 60;

            let timeText = '';
            if (hours > 0) {
                timeText = `${hours}小时${minutes}分钟${seconds}秒`;
            } else if (minutes > 0) {
                timeText = `${minutes}分钟${seconds}秒`;
            } else {
                timeText = `${seconds}秒`;
            }

            expireTimeEl.textContent = timeText;
        }

        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 1000);
    }

    function showDeleteButton() {
        deleteBtn.style.display = "block";
    }

    function hideQueryButton() {
        queryBtn.style.display = "none";
    }

    function resetDeleteButton() {
        deleteConfirmStage = 0;
        deleteBtn.textContent = "删除文件";
        deleteBtn.classList.remove("confirm");
    }

    async function deleteRepository() {
        if (!authenticated || !currentPassword) {
            showToast("请先验证密码");
            return;
        }
        showLoading("正在删除...");
        try {
            const resp = await fetch(host + "/system/api/v1/repository", {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify([{ id: repositoryId, password: currentPassword }])
            });
            if (!resp.ok) throw new Error("删除请求失败");
            const json = await resp.json();
            if (json.code !== 0) throw new Error(json.message || "删除失败");

            hideLoading();
            showDeletedState();
            showToast("删除成功");
        } catch (e) {
            hideLoading();
            resetDeleteButton();
            showToast(e.message || "删除失败");
        }
    }

    function showDeletedState() {
        const card = document.querySelector(".card");
        card.innerHTML = `
            <h1 onclick="goToHome()" class="page-title">中转站</h1>
            <div class="deleted-state">
                <h2>✅ 已删除</h2>
                <p>该文件已被成功删除</p>
                <button onclick="goToHome()" class="btn" style="margin-top: 20px; width: auto; padding: 12px 32px;">
                    返回首页
                </button>
            </div>
        `;
    }

    function showExpiredState() {
        const card = document.querySelector(".card");
        card.innerHTML = `
            <h1 onclick="goToHome()" class="page-title">中转站</h1>
            <div class="expired-state">
                <div class="error-code">已过期</div>
                <div class="error-title">内容已过期</div>
                <div class="error-desc">
                    该内容已期，可能已被自动清理。
                </div>
                <button onclick="goToHome()" class="btn" style="margin-top: 20px; width: auto; padding: 12px 32px;">
                    返回首页
                </button>
            </div>
        `;
    }

    function goToHome() {
        window.location.href = host || (window.location.protocol + "//" + window.location.host);
    }

    async function authentication(password) {
        const resp = await fetch(host + "/system/api/v1/repository/authentication", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: repositoryId, password })
        });
        if (!resp.ok) throw new Error("认证失败");
        const json = await resp.json();
        if (json.code === 4) throw new Error("密码错误");
        if (json.code !== 0) throw new Error(json.message);
        authenticated = true;
        currentPassword = password;
    }

    async function loadRepository() {
        const resp = await fetch(host + "/system/api/v1/repository?ids=" + encodeURIComponent(repositoryId));
        if (!resp.ok) throw new Error("获取存储信息失败");
        const json = await resp.json();
        if (json.code !== 0) throw new Error(json.message);
        if (!json.data.list?.length) throw new Error("内容不存在");

        Object.assign(repository, json.data.list[0]);
        expireAt = repository.expire_at || 0;
        if (expireAt > 0) {
            expireInfo.style.display = "flex";
            startCountdown();
        }
    }

    async function loadFiles() {
        const ids = repository.files || [];
        if (ids.length === 0) return;
        const query = ids.map(id => "ids=" + encodeURIComponent(id)).join("&");
        const resp = await fetch(host + "/system/api/v1/file?" + query);
        if (!resp.ok) throw new Error("获取文件失败");
        const json = await resp.json();
        if (json.code !== 0) throw new Error(json.message);
        fileInfos.length = 0;
        fileInfos.push(...json.data.list);
    }

    async function queryRepository() {
        if (authenticated) return;
        const password = passwordInput.value.trim();
        if (!isPasswordValid()) {
            showToast("请输入4位字母或数字密码");
            return;
        }
        queryBtn.disabled = true;
        try {
            showLoading("正在验证...");
            await authentication(password);
            setLoadingTitle("正在获取文件信息...");
            await loadRepository();
            await loadFiles();
            hideLoading();
            renderFiles();
            passwordInput.disabled = true;
            hideQueryButton();
            showDeleteButton();
            showToast("验证成功");
        } catch (e) {
            hideLoading();
            showToast(e.message || "验证失败");
        } finally {
            if (!authenticated) queryBtn.disabled = false;
        }
    }

    /* ---------- 使用 CryptoJS 进行 AES 解密 ---------- */
    function decryptAES(encryptedUint8, password) {
        const encryptedWordArray = CryptoJS.lib.WordArray.create(encryptedUint8);
        const key = CryptoJS.SHA256(password);

        const iv = CryptoJS.lib.WordArray.create(encryptedUint8.slice(0, 16));
        const ciphertext = CryptoJS.lib.WordArray.create(encryptedUint8.slice(16));

        const decrypted = CryptoJS.AES.decrypt(
            { ciphertext: ciphertext },
            key,
            { iv: iv, padding: CryptoJS.pad.Pkcs7, mode: CryptoJS.mode.CBC }
        );

        const decryptedArray = decrypted.words.reduce((acc, word) => {
            acc.push((word >> 24) & 0xff);
            acc.push((word >> 16) & 0xff);
            acc.push((word >> 8) & 0xff);
            acc.push(word & 0xff);
            return acc;
        }, []);

        return new Uint8Array(decryptedArray);
    }

    async function downloadEncryptedZip() {
        showLoading("正在下载文件...");
        const resp = await fetch(host + "/system/api/v1/repository/file", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: repositoryId, password: currentPassword })
        });
        if (!resp.ok) throw new Error("下载失败");

        const total = Number(resp.headers.get("Content-Length") || 0);
        const reader = resp.body.getReader();
        const chunks = [];
        let received = 0;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            if (total > 0) setProgress(received * 100 / total);
            else progressText.innerText = formatSize(received);
        }

        const data = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
            data.set(chunk, offset);
            offset += chunk.length;
        }
        return data;
    }

    async function unzipZip(buffer) {
        setLoadingTitle("正在解压文件...");
        setProgress(0);
        blobCache.clear();
        urlCache.forEach(url => URL.revokeObjectURL(url));
        urlCache.clear();

        const zip = await JSZip.loadAsync(buffer);
        const entries = Object.values(zip.files).filter(item => !item.dir);
        for (let i = 0; i < entries.length; i++) {
            const entry = entries[i];
            const blob = await entry.async("blob");
            blobCache.set(entry.name, blob);
            setProgress((i + 1) * 100 / entries.length);
        }
        downloaded = true;
        hideLoading();
    }

    async function ensureDownloaded() {
        if (downloaded) return;

        const encryptedData = await downloadEncryptedZip();
        setLoadingTitle("正在解密文件...");
        setProgress(50);

        const decryptedUint8 = decryptAES(encryptedData, currentPassword);
        const decryptedBuffer = decryptedUint8.buffer;

        await unzipZip(decryptedBuffer);
    }

    async function previewImage(fileId) {
        if (!authenticated) {
            showToast("请先验证密码");
            return;
        }
        try {
            await ensureDownloaded();
            // 下载成功后显示评价区域
            showRatingSection();
        } catch (e) {
            hideLoading();
            console.error(e);
            showToast(e.message || "下载/解密失败");
            return;
        }
        const blob = blobCache.get(fileId);
        if (!blob) return showToast("文件不存在");

        let url = urlCache.get(fileId);
        if (!url) {
            url = URL.createObjectURL(blob);
            urlCache.set(fileId, url);
        }
        viewerImage.src = url;
        viewer.style.display = "flex";
        updateThumbnail(fileId, url);
    }

    function updateThumbnail(fileId, url) {
        const item = fileList.querySelector(`[data-id="${fileId}"]`);
        if (!item) return;
        const thumb = item.querySelector(".thumb");
        if (!thumb || thumb.querySelector("img")) return;
        thumb.innerHTML = `<img src="${url}">`;
    }

    /* ---------- 事件绑定 ---------- */
    queryBtn.addEventListener("click", queryRepository);
    passwordInput.addEventListener("keydown", e => e.key === "Enter" && queryRepository());

    deleteBtn.addEventListener("click", () => {
        if (deleteConfirmStage === 0) {
            deleteConfirmStage = 1;
            deleteBtn.textContent = "确认删除？";
            deleteBtn.classList.add("confirm");
            setTimeout(() => {
                if (deleteConfirmStage === 1) resetDeleteButton();
            }, 5000);
        } else {
            deleteRepository();
        }
    });

    viewer.addEventListener("click", () => {
        viewer.style.display = "none";
        viewerImage.removeAttribute("src");
    });

    function initialize() {
        renderEmpty("请输入密码后查看文件");
        const params = new URLSearchParams(location.search);
        const password = params.get("password");
        if (password && /^[A-Za-z0-9]{4}$/.test(password)) {
            passwordInput.value = password;
            queryRepository();
        }
    }

    initialize();

    window.addEventListener("beforeunload", () => {
        if (countdownInterval) clearInterval(countdownInterval);
        urlCache.forEach(url => URL.revokeObjectURL(url));
        urlCache.clear();
    });

    document.addEventListener("keydown", e => {
        if (e.key === "Escape") {
            viewer.style.display = "none";
            viewerImage.removeAttribute("src");
        }
    });
</script>
</body>
</html>
